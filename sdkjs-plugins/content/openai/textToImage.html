<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8" />
	<title>Text to image</title>
	<script src="./vendor/jquery-v2.2.2-min.js"></script>
	<script src="vendor/select2-4.0.13/js/select2.js"></script>
	<script type="text/javascript" src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.js"></script>
	<script type="text/javascript" src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins-ui.js"></script>
	<script type="text/javascript" src="vendor/GPT-3-Encoder/encoder.js"></script>
	<script type="text/javascript" src="scripts/textToImage.js"></script>
	<script type="text/javascript" src="scripts/desktop.js"></script>
	<link rel="stylesheet" href="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.css">
	<link rel="stylesheet" href="vendor/select2-4.0.13/css/select2.css"/>
	<link rel="stylesheet" href="./resources/css/custom.css">
</head>
<body>
	<div id="div_content" class="div_main div_content">
		<div class="div_main">
			<label class="i18n noselect" style="margin-bottom: 12px;">It creates an image from scratch from a text description</label>
			<div>
				<label class="header i18n">Prompt</label>
				<textarea id="textarea" class="form-control prompt white_bg i18n" style="margin-top: 4px;" placeholder="Description of what you want to generate"></textarea>
			</div>
			<div>
				<div id="div_modal" class="div_modal hidden form-control noselect" style="top:180px !important">
					<div class="div_row">
						<label class="i18n">Up to</label>
						<label id="lb_modal_length">4000</label>
						<label class="i18n">tokens in response.</label>
					</div>
				</div>
				<div class="div_tokens noselect">
					<div id="div_tokens">
						<label class="i18n">Tokens: </label>
						<label id="lb_tokens">0</label>
					</div>
				</div>
			</div>
			<button id="btn_generate" class="btn-text-default i18n" style="width: 100%; margin: 14px 0;">Generate</button>
		</div>
		<div id="div_show_settings" class="div_show_settings">
			<label class="link i18n noselect">Show advanced settings</label>
			<div class="div_arrow">
				<b id="arrow" class="arrow arrow_down"></b>
			</div>
		</div>
	
		<div id="div_parametrs" class="div_settings hidden">
			<div class="div_parametr">
				<div class="form-control div_title hidden">
					<label class="i18n">The model which will generate the completion. Some models are suitable for natural language tasks, others specialize in code.</label>
				</div>
				<div class="div_lbl_params">
					<label class="header lbl_params i18n">Model</label>
					<div class="icon_info"></div>
				</div>
				<select id="sel_models" class="form-control">
					<option value="dall-e-2">DALL E 2</option>
					<option value="dall-e-3">DALL E 3</option>
				</select>
			</div>
			<div class="div_parametr">
				<div class="form-control div_title hidden">
					<label class="i18n">The size of the generated images. Must be one of 256x256, 512x512, or 1024x1024 for dall-e-2. Must be one of 1024x1024, 1792x1024, or 1024x1792 for dall-e-3 models.</label>
				</div>
				<div class="div_lbl_params">
					<label class="header lbl_params i18n">Size</label>
					<div class="icon_info"></div>
				</div>
				<select id="sel_size" class="form-control">
					<option id="opt_256" value="256x256">256x256</option>
					<option id="opt_512" value="512x512">512x512</option>
					<option value="1024x1024">1024x1024</option>
					<option id="opt_1024" value="1792x1024" disabled>1792x1024</option>
					<option id="opt_1792" value="1024x1792" disabled>1024x1792</option>
				</select>
			</div>
			<!-- hide this settings because using base64 more comfortable -->
			<div class="div_parametr hidden">
				<div class="form-control div_title hidden">
					<label class="i18n">The format in which the generated images are returned. Must be one of url or b64_json. URLs are only valid for 60 minutes after the image has been generated.</label>
				</div>
				<div class="div_lbl_params">
					<label class="header lbl_params i18n">Response format</label>
					<div class="icon_info"></div>
				</div>
				<select id="sel_response_format" class="form-control">
					<option value="b64_json">BASE64</option>
					<option value="url">URL</option>
				</select>
			</div>
			<div class="div_parametr">
				<div class="form-control div_title hidden">
					<label class="i18n">The style of the generated images. Must be one of vivid or natural. Vivid causes the model to lean towards generating hyper-real and dramatic images. Natural causes the model to produce more natural, less hyper-real looking images. This param is only supported for dall-e-3.</label>
				</div>
				<div class="div_lbl_params">
					<label class="header lbl_params i18n">Style</label>
					<div class="icon_info"></div>
				</div>
				<select id="sel_style" class="form-control" disabled>
					<option value="vivid">Vivid</option>
					<option value="natural">Natural</option>
				</select>
			</div>
			<!-- hide this settings because we don't have a preview window -->
			<div class="div_parametr noselect hidden">
				<div class="form-control div_title">
					<label class="i18n">The number of images to generate. Must be between 1 and 10. For dall-e-3, only n=1 is supported.</label>
				</div>
				<div class="div_lbl_params hidden">
					<label class="header lbl_params i18n">Count</label>
					<div class="icon_info"></div>
				</div>
				<div class="div_param_val">
					<input id="inp_count_sl" type="range" min="1" max="10" step="1" value="1" style="width: 100%; background-size: 0% 100%;">	
					<label id="lb_count" class="lbl_param_val">1</label>
				</div>
			</div>
			<div class="div_parametr">
				<div class="form-control div_title hidden">
					<label class="i18n">The quality of the image that will be generated. hd creates images with finer details and greater consistency across the image. This param is only supported for dall-e-3.</label>
				</div>
				<div class="div_lbl_params">
					<label class="header lbl_params i18n">Quality</label>
					<div class="icon_info"></div>
				</div>
				<div class="div_lbl_params">
					<input id="inp_quality" type="checkbox" class="form-control" style="vertical-align: middle;" disabled><label style="margin-left: 5px;vertical-align: middle;">HD</label>
				</div>
			</div>
		</div>
	</div>
	<div id="loader-container" class="loader gray_bg hidden"></div>
	<div id="div_err" class="hidden div_error gray_bg">
		<label class="lb_err i18n" style="font-weight: bold;">Error</label>
		<div id="lb_err"></div>
	</div>
</body>
</html>
