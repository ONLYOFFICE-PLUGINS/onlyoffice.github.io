<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>ChatGPT</title>
	<script src="./vendor/jquery-v2.2.2-min.js"></script>
	<script src="vendor/select2-4.0.13/js/select2.js"></script>
    <script type="text/javascript" src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.js"></script>
    <script type="text/javascript" src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins-ui.js"></script>
    <script type="text/javascript" src="scripts/desktop.js"></script>
    <script type="text/javascript" src="vendor/GPT-3-Encoder/encoder.js"></script>
    <script type="text/javascript" src="scripts/translate.js"></script>
    <link rel="stylesheet" href="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.css">
	<link rel="stylesheet" href="vendor/select2-4.0.13/css/select2.css"/>
    <link rel="stylesheet" href="./resources/css/styles.css">
	<style>
		body {
			margin: 0px;
			width: 100%;
			height: 100%;
			border: none;
			padding: 16px;
		}
	</style>
</head>
<body>
	<div style="margin-bottom: 14px;">
		<label class="header lbl_params i18n">Configure the settings and select the text for translation in the document</label>
	</div>
	<div class="div_param">
		<label class="header lbl_params i18n">Source language</label>
		<select id="sel_source_lang" class="form-control"></select>
	</div>
	<div class="div_param">
		<label class="header lbl_params i18n">Target language</label>
		<select id="sel_target_lang" class="form-control"></select>
	</div>
	<button id="btn_switch" class="btn-text-default i18n" style="width: 100%; margin-bottom: 14px;">Swith languages</button>

	<div id="div_show_settings" class="div_show_settings">
		<label class="link i18n noselect">Show advanced settings</label>
		<div class="div_arrow">
			<b id="arrow" class="arrow arrow_down"></b>
		</div>
	</div>

	<div id="div_parametrs" class="hidden">
		<div class="div_param" style="margin-top: 12px;">
			<label class="header lbl_params i18n">Type of translation</label>
			<select id="sel_translation_type" class="form-control"></select>
		</div>
		<div class="div_param">
			<label class="header lbl_params i18n">Target audience</label>
			<select id="sel_target_audience" class="form-control"></select>
		</div>
		<div class="div_param">
			<label class="header lbl_params i18n">Tone of translation</label>
			<select id="sel_translation_tone" class="form-control"></select>
		</div>
	</div>
	<div id="loader-container" class="loader hidden"></div>
	<div id="div_err" class="hidden div_error err_background">
		<label class="lb_err i18n" style="font-weight: bold;">Error</label>
		<div id="lb_err"></div>
	</div>
	<div id="translated_container" class="invisible">
		<label class="header lbl_params i18n" style="margin-bottom: 6px;">Translated text</label>
		<div id="div_result" style="margin-top: 6px; overflow: auto; height: 100% !important;"></div>
		<div class="div_translate_footer_buttons">
			<button id="btn_paste" class="btn-text-default i18n" style="flex: 0.5; margin-right: 10px;">Insert as review</button>
			<button id="btn_copy" class="btn-text-default i18n" style="flex: 0.5;">Copy</button>
		</div>
	</div>
</body>
</html>
