<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Svelte Flow Starter</title>
    <style>
      body {
        margin: 0;
      }
    </style>
    <script type="module" crossorigin src="code.js"></script>
    <link rel="stylesheet" crossorigin href="app.css">
  </head>
  <body>
    <div id="app"></div>
    <script>
        const searchParams = new URLSearchParams(window.location.search);
        window.config = {
          minimap: searchParams.get("minimap"),
          zoomctrls: searchParams.get("zoomctrls"),
        };
    </script>
  </body>
</html>
